name: Deploy to Cloudflare Pages

# Reusable workflow - called by preview and production landing workflows
on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Name of the build artifact to download and deploy"
        required: true
        type: string
      branch:
        description: "Branch name for Cloudflare Pages deployment alias"
        required: true
        type: string
      project-name:
        description: "Cloudflare Pages project name"
        required: true
        type: string
      environment:
        description: "GitHub deployment environment name"
        required: false
        type: string
        default: 'preview'
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true
    outputs:
      deployment-url:
        description: "Cloudflare direct deployment URL"
        value: ${{ jobs.deploy.outputs.deployment-url }}
      alias-url:
        description: "Cloudflare branch alias URL"
        value: ${{ jobs.deploy.outputs.alias-url }}

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
      alias-url: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: dist

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ inputs.project-name }} --branch=${{ inputs.branch }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
